<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Details</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
            background: #fdfbf7;
            min-height: 100vh;
            padding: 40px 20px;
            color: #1a1a1a;
            line-height: 1.6;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
        }

        /* Masthead */
        .masthead {
            font-family: Georgia, 'Times New Roman', serif;
            text-align: center;
            color: #1a1a1a;
            margin-bottom: 60px;
            padding-bottom: 20px;
            font-size: 3em;
            font-weight: 400;
            letter-spacing: -0.02em;
            border-bottom: 1px solid #e5e5e5;
        }

        .back-link {
            display: inline-block;
            color: #1a1a1a;
            text-decoration: none;
            font-size: 0.95em;
            margin-bottom: 40px;
            font-weight: 400;
            transition: opacity 0.2s ease;
        }

        .back-link:hover {
            opacity: 0.6;
        }

        .post-id {
            font-size: 0.85em;
            color: #999;
            margin-bottom: 8px;
            font-weight: 400;
        }

        .post-title {
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 2.5em;
            font-weight: 400;
            line-height: 1.2;
            letter-spacing: -0.02em;
            color: #1a1a1a;
            margin-bottom: 20px;
        }

        .post-meta {
            font-weight: 400;
            margin-bottom: 30px;
            color: #666;
            font-size: 0.95em;
        }

        .post-image {
            margin: 30px 0;
        }

        .post-image img {
            width: 100%;
            height: auto;
        }

        .post-body {
            line-height: 1.8;
            font-size: 1.05em;
            margin-bottom: 40px;
            color: #333;
        }

        .post-body::first-letter {
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 4.5em;
            line-height: 0.85;
            float: left;
            margin: 8px 8px 0 0;
            color: #1a1a1a;
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 50px;
            padding-top: 30px;
            border-top: 1px solid #e5e5e5;
        }

        .btn {
            flex: 1;
            padding: 12px 24px;
            border: none;
            text-decoration: none;
            font-size: 0.95em;
            font-weight: 400;
            text-align: center;
            cursor: pointer;
            transition: opacity 0.2s ease;
            display: inline-block;
        }

        .btn-disabled {
            background: #e0e0e0;
            color: #999;
            cursor: not-allowed;
        }

        .btn-disabled:hover {
            opacity: 1;
        }

        /* Comments Section */
        .comments-section {
            margin-top: 60px;
            padding-top: 40px;
            border-top: 1px solid #d0d0d0;
        }

        .comments-title {
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 1.5em;
            font-weight: 400;
            color: #1a1a1a;
            margin-bottom: 30px;
            letter-spacing: -0.01em;
        }

        .comment {
            background: transparent;
            padding: 25px 0;
            border-bottom: 1px solid #e5e5e5;
            margin-bottom: 0;
        }

        .comment:last-child {
            border-bottom: none;
        }

        .comment-name {
            font-weight: 600;
            color: #1a1a1a;
            font-size: 1em;
            margin-bottom: 5px;
        }

        .comment-email {
            font-size: 0.85em;
            color: #999;
            margin-bottom: 12px;
        }

        .comment-body {
            font-size: 1em;
            color: #333;
            line-height: 1.7;
        }

        .loading, .error {
            text-align: center;
            padding: 40px;
            font-size: 1.1em;
            color: #666;
        }

        .error {
            color: #dc3545;
        }

        .no-comments {
            text-align: center;
            color: #999;
            padding: 40px 0;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="masthead">The Editorial</h1>

        <a href="/" class="back-link">← Back to Posts</a>

        <div id="post-content">
            <div class="loading">Loading post details...</div>
        </div>

        <div id="comments-content" style="display: none;">
            <!-- Comments will be loaded here -->
        </div>
    </div>

    <script>
        async function loadPostDetail() {
            try {
                const postId = window.location.pathname.split("/").pop();

                if (!postId) {
                    throw new Error('Invalid post parameter');
                }

                // Fetch post details first
                const postResponse = await fetch(`https://jsonplaceholder.typicode.com/posts/${postId}`);
                if (!postResponse.ok) throw new Error('Post not found');
                const post = await postResponse.json();

                // Fetch user info using the userId FROM THE POST DATA
                let authorName = `Author ${post.userId}`;
                try {
                    const userResponse = await fetch(`https://jsonplaceholder.typicode.com/users/${post.userId}`);
                    if (userResponse.ok) {
                        const user = await userResponse.json();
                        authorName = user.name;
                    }
                } catch (e) {
                     console.error("User fetch failed", e);
                }

                // Fetch comments
                const commentsResponse = await fetch(`https://jsonplaceholder.typicode.com/posts/${postId}/comments`);
                const comments = await commentsResponse.json();

                // Image URL
                const imageUrl = `https://picsum.photos/800/500?random=${postId}`;

                const contentContainer = document.getElementById('post-content');
                contentContainer.innerHTML = `
                    <div class="post-id">Post ID: ${post.id}</div>
                    <h2 class="post-title">${post.title}</h2>
                    <div class="post-meta">By ${authorName} • Today • 3 min read</div>

                    <div class="post-image">
                        <img src="${imageUrl}" alt="Post image">
                    </div>

                    <div class="post-body">${post.body}</div>

                    <!-- Disabled Edit and Delete Buttons for External Posts -->
                    <div class="action-buttons">
                        <button class="btn btn-disabled"
                                onclick="alert('Cannot edit external posts')">Edit Post</button>
                        <button class="btn btn-disabled"
                                onclick="alert('Cannot delete external posts')">Delete Post</button>
                    </div>
                `;

                // Render Comments
                const commentsContainer = document.getElementById('comments-content');
                commentsContainer.style.display = 'block';
                commentsContainer.className = 'comments-section';

                let commentsHtml = `<h3 class="comments-title">Comments (${comments.length})</h3>`;

                if (comments.length > 0) {
                    comments.forEach(comment => {
                        commentsHtml += `
                            <div class="comment">
                                <div class="comment-name">${comment.name}</div>
                                <div class="comment-email">${comment.email}</div>
                                <div class="comment-body">${comment.body}</div>
                            </div>
                        `;
                    });
                } else {
                    commentsHtml += '<div class="no-comments">No comments yet.</div>';
                }

                commentsContainer.innerHTML = commentsHtml;

            } catch (error) {
                document.getElementById('post-content').innerHTML = `
                    <div class="error">Error loading post details: ${error.message}</div>
                `;
            }
        }

        loadPostDetail();
    </script>
</body>
</html>
