<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Comment</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
            background: #fdfbf7;
            min-height: 100vh;
            padding: 40px 20px;
            color: #1a1a1a;
            line-height: 1.6;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
        }

        /* Masthead */
        .masthead {
            font-family: Georgia, 'Times New Roman', serif;
            text-align: center;
            color: #1a1a1a;
            margin-bottom: 60px;
            padding-bottom: 20px;
            font-size: 3em;
            font-weight: 400;
            letter-spacing: -0.02em;
            border-bottom: 1px solid #e5e5e5;
        }

        .back-link {
            display: inline-block;
            color: #1a1a1a;
            text-decoration: none;
            font-size: 0.95em;
            margin-bottom: 40px;
            font-weight: 400;
            transition: opacity 0.2s ease;
        }

        .back-link:hover {
            opacity: 0.6;
        }

        .page-title {
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 2em;
            font-weight: 400;
            color: #1a1a1a;
            margin-bottom: 10px;
            letter-spacing: -0.02em;
        }

        .subtitle {
            color: #666;
            margin-bottom: 40px;
            font-size: 1em;
        }

        .form-group {
            margin-bottom: 30px;
        }

        label {
            display: block;
            color: #1a1a1a;
            font-weight: 500;
            margin-bottom: 10px;
            font-size: 0.95em;
        }

        .required {
            color: #dc3545;
        }

        textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #d0d0d0;
            font-size: 1em;
            font-family: inherit;
            transition: border-color 0.3s;
            background: #fff;
            min-height: 150px;
            resize: vertical;
            line-height: 1.7;
        }

        textarea:focus {
            outline: none;
            border-color: #1a1a1a;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid #e5e5e5;
        }

        button {
            flex: 1;
            padding: 12px 24px;
            border: none;
            font-size: 0.95em;
            font-weight: 400;
            cursor: pointer;
            transition: opacity 0.2s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .submit-btn {
            background: #ffc107;
            color: #1a1a1a;
        }

        .submit-btn:hover {
            opacity: 0.8;
        }

        .cancel-btn {
            background: #e0e0e0;
            color: #1a1a1a;
        }

        .cancel-btn:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="masthead">The Editorial</h1>

        <a href="/my-post/{{ comment.post_id }}" class="back-link">← Back to Post</a>

        <h2 class="page-title">Edit Comment</h2>
        <p class="subtitle">Update your comment</p>

        <form method="POST" action="/edit-comment/{{ comment.id }}">
            <div class="form-group">
                <label for="content">Comment <span class="required">*</span></label>
                <textarea id="content" name="content" required
                          placeholder="Write your comment">{{ comment.content }}</textarea>
            </div>

            <div class="button-group">
                <button type="button" class="cancel-btn"
                        onclick="window.location.href='/my-post/{{ comment.post_id }}'">Cancel</button>
                <button type="submit" class="submit-btn">Update Comment</button>
            </div>
        </form>
    </div>
</body>
</html>
